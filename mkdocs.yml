# MkDocs Material 설정 (옵션 B 배포용)
# 사용법:  pip install mkdocs-material  →  mkdocs serve  →  mkdocs gh-deploy
# wiki/ 계층(LLM 생성 지식)만 배포합니다. sources/(원본)는 배포 제외.
site_name: 학습 위키 (중3)
site_description: Karpathy LLM Wiki 모델로 컴파일되는 중3 학습 지식베이스 (수학·물리)
theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로

docs_dir: wiki

nav:
  - 홈: index.md
  - 활동 로그: log.md
  - 수학:
      - 문제: math/problems/README.md
      - 개념: math/concepts/README.md
      - 오답 패턴: math/mistakes/README.md
      - 시험 대비:
          - 개요: math/exams/README.md
          - 종합대비(미적분Ⅰ+이차방정식): math/exams/2026-종합대비-미적분1-이차방정식.md
      - 대시보드:
          - 약점 지도: math/dashboard/weakness-map.md
          - 강점 리포트: math/dashboard/strength-report.md
          - 주간 리뷰: math/dashboard/weekly-review.md
  - 물리:
      - 문제: physics/problems/README.md
      - 개념: physics/concepts/README.md
      - 오답 패턴: physics/mistakes/README.md
      - 시험 대비: physics/exams/README.md
      - 약점 지도: physics/dashboard/weakness-map.md
  - 입시:
      - 개요: admissions/index.md
      - 용인외대부고: admissions/schools/용인외대부고.md
      - 자기소개서: admissions/topics/자기소개서.md
      - 면접: admissions/topics/면접.md
      - 영어시험 준비: admissions/topics/영어시험-준비.md
      - 고교 선택: admissions/topics/고교선택.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  # jsdelivr가 unpkg보다 한국 모바일망에서 안정적(수식이 날것으로 보이는 문제 방지)
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang: ko
