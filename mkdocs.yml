# MkDocs Material 설정 (옵션 B 배포용)
# 사용법:  pip install mkdocs-material  →  mkdocs serve  →  mkdocs gh-deploy
# wiki/ 계층(LLM 생성 지식)만 배포합니다. sources/(원본)는 배포 제외.
site_name: 수학 학습 위키 (중3)
site_description: Karpathy LLM Wiki 모델로 컴파일되는 중3 수학 학습 지식베이스
theme:
  name: material
  language: ko
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.code.copy
  palette:
    - scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드로
    - scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드로

docs_dir: wiki

nav:
  - 홈: index.md
  - 활동 로그: log.md
  - 문제: problems/README.md
  - 개념: concepts/README.md
  - 오답 패턴: mistakes/README.md
  - 시험 대비:
      - 개요: exams/README.md
      - 종합대비(미적분Ⅰ+이차방정식): exams/2026-종합대비-미적분1-이차방정식.md
  - 대시보드:
      - 약점 지도: dashboard/weakness-map.md
      - 강점 리포트: dashboard/strength-report.md
      - 주간 리뷰: dashboard/weekly-review.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search:
      lang: ko
